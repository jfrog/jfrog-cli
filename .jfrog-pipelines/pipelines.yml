resources:
  - name: jfrog_cli
    type: GitRepo
    configuration:
      path: jfrog/jfrog-cli
      gitProvider: jfrog_cli_gh
      branches:
        include: jfrogpipelines
  - name: cli_coreapps_env_details
    type: PropertyBag
    configuration:
      suffix: "value_to_be_set"
  - name: jfrog_oauth_token
    type: PropertyBag
    configuration:
      token: "value_to_be_set"
      url: "value_to_be_set"
pipelines:
  - name: jfrog_artifactory_ecomatrix_cli_e2e
    configuration:
      integrations:
        - name: jfrog_cli_tests
      environmentVariables:
        readOnly:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          RT_VERSION:
            default: "${RT_VERSION}"
            description: "Artifactory version for warm environment deployment"
            allowCustom: true
          SKIP_ENV_SETUP:
            default: "false"
            description: "Skip environment setup"
            allowCustom: true
          MASTER_KEY:
            default: "${int_jfrog_cli_tests_master_key}"
            description: "Master key to use for tests (required)"
            allowCustom: true
          JFROG_ADMIN_USERNAME:
            default: "${int_jfrog_cli_tests_username}"
            description: "JFrog admin username (required for tests)"
            allowCustom: true
          JFROG_ADMIN_PASSWORD:
            default: "${int_jfrog_cli_tests_password}"
            description: "JFrog admin password (required for tests)"
            allowCustom: true
          GITHUB_API_URL:
            default: "https://github.jfrog.info/api/v3"
            description: "GitHub API root (github.com: https://api.github.com; Enterprise: https://<host>/api/v3)"
            allowCustom: true
          GITHUB_WORKFLOWS_REPO:
            default: "JFROG/jfrog-cli-workflows"
            description: "org/repo on GitHub Enterprise that hosts .github/workflows/*Tests.yml"
            allowCustom: true
          GITHUB_WORKFLOWS_REF:
            default: "feature/RTECO-1003-add-podman-pipelines-workflows"
            description: "Branch or tag in jfrog-cli-workflows that defines the test workflow files (workflow_dispatch ref)."
            allowCustom: true
          JFROG_CLI_GITHUB_REPO:
            default: "jfrog/jfrog-cli"
            description: "org/repo passed to Actions as jfrog_cli_repository"
            allowCustom: true
          JFROG_CLI_GITHUB_REF:
            default: "jfrogpipelines"
            description: "Git ref to checkout in jfrog/jfrog-cli (branch, tag, or SHA)."
            allowCustom: true
          GITHUB_DISPATCH_TOKEN:
            default: ""
            description: "PAT for github.jfrog.info API (repo + workflow). If empty, int_jfrog_cli_gh_token from jfrog_cli_gh is used — that value must be a PAT, not only a Git password, or workflow_dispatch returns 401."
            allowCustom: true
          GHE_ACTIONS_RUNNER:
            default: "artifactory-dind-amd-scale-set"
            description: "GitHub Actions runs-on label for all test jobs (use your self-hosted label; github.com-style ubuntu-24.04 is often unavailable on GHE)"
            allowCustom: true
          RTLIC:
            default: "${int_jfrog_cli_tests_rtlic}"
            description: "Artifactory license key passed to GitHub Actions for Docker and Transfer tests (local Artifactory). Leave empty to skip those suites."
            allowCustom: true

    steps:
      - name: setup_cli_test
        type: Bash
        configuration:
          integrations:
            - name: docker_jfrog_io_reader
          outputResources:
            - name: cli_coreapps_env_details
          environmentVariables:
            ARTIFACTORY_URL:
              default: "https://servername.jfrogdev.org"
              description: "Artifactory URL to use for tests (required)"
              allowCustom: true
            JFROG_ADMIN_TOKEN:
              default: "${int_jfrog_cli_tests_token}"
              description: "JFrog admin access token (required for tests)"
              allowCustom: true
        execution:
          onStart:
            - echo "Starting CLI tests"
            - echo "Using RT_VERSION=${RT_VERSION}"
            - |
              # Generate unique suffix and set variables
              suffix=$(date +%s)
              server_name="cli${suffix}"
              env_url="https://${server_name}.jfrogdev.org"
              
              echo "Generated suffix: ${suffix}"
              echo "Server name: ${server_name}"
              echo "Environment URL: ${env_url}"
              
              # Write to resource
              write_output "cli_coreapps_env_details" "suffix=${suffix}"
              write_output "cli_coreapps_env_details" "env_url=${env_url}"
              
              # Set pipeline variables
              add_pipeline_variables server_name="${server_name}"
              
              # Set ARTIFACTORY_URL based on SKIP_ENV_SETUP
              if [[ "${SKIP_ENV_SETUP}" == "true" ]]; then
                echo "SKIP_ENV_SETUP is true, using provided ARTIFACTORY_URL"
                # ARTIFACTORY_URL should already be set via pipeline environment variable
              else
                echo "Setting ARTIFACTORY_URL to ${env_url}"
                add_pipeline_variables ARTIFACTORY_URL="${env_url}"
              fi

      - name: deploy_environment
        type: Jenkins
        configuration:
          condition: 'SKIP_ENV_SETUP != "true"'
          integrations:
            - name: jenkins_entplus_rt
          inputResources:
            - name: cli_coreapps_env_details
          inputSteps:
            - name: setup_cli_test
              status:
                - success
          jenkinsJobName: tools/platform/environment_setup_gen2
          buildParameters:
            SERVER_NAME: "cli${res_cli_coreapps_env_details_suffix}"
            DEPLOYMENT_TYPE: onprem
            ACCOUNT_TYPE: "enterprise_plus"
            GROUP: "ARTIFACTORY"
            EXPIRY: 2d
            EXTRA_PARAMS: "conf_artifactory_unified_version=${RT_VERSION} master_key=${MASTER_KEY}"

      - name: setup_environment
        type: Bash
        configuration:
          environmentVariables:
            ART_URL:
              default: "${res_cli_coreapps_env_details_env_url}"
              description: "Artifactory URL to use for tests (required)"
              allowCustom: true
            JOIN_KEY:
              default: "${MASTER_KEY}"
              description: "Join key to use for tests (required)"
              allowCustom: true
          inputSteps:
            - name: deploy_environment
              status:
                - success
                - skipped
          outputResources:
            - name: jfrog_oauth_token
          inputResources:
            - name: cli_coreapps_env_details
          integrations:
            - name: docker_jfrog_io_reader
        execution:
          onStart:
            - echo "Setting up environment"
            - |
              # Determine Artifactory URL
              if [[ -n "${ART_URL}" ]]; then
                echo "Using custom ART_URL=${ART_URL}"
              elif [[ -n "${res_cli_coreapps_env_details_env_url}" ]]; then
                echo "ART_URL not set, using env_url from cli_coreapps_env_details resource"
                ART_URL="${res_cli_coreapps_env_details_env_url}"
                echo "ART_URL=${ART_URL}"
              else
                echo "ERROR: Neither ART_URL nor cli_coreapps_env_details.env_url is set"
                exit 1
              fi
              
              # Install JFrog CLI
              echo "Installing JFrog CLI, Version: 2.54.0"
              curl -fL https://getcli.jfrog.io/v2 | sh -s 2.54.0
              export PATH=$PATH:$HOME/.jfrog
              
              # Install JFrog CLI Access Plugin
              echo "Installing JFrog CLI Access Plugin, Version: 7.66.0"
              jfrog plugin install access@v7.66.0
              
              # Generate tokens
              JOIN_KEY="${JOIN_KEY:-${MASTER_KEY}}"
              echo "Generating support token for ${ART_URL}"

              # Run support-token command and capture output + exit code
              SUPPORT_OUTPUT=$(jfrog access support-token --url="${ART_URL}/access" --join-key="${JOIN_KEY}" 2>&1) || {
                echo "ERROR: Failed to generate support token"
                echo "Output: ${SUPPORT_OUTPUT}"
                echo "Support_token=${SUPPORT_OUTPUT}"
                exit 1
              }
              
              # Fixed parsing - extract everything after JF_ACCESS_ADMIN_TOKEN=
              SUPPORT_TOKEN=$(echo "${SUPPORT_OUTPUT}" | grep -o 'JF_ACCESS_ADMIN_TOKEN=.*' | cut -d'=' -f2-)

              if [[ -z "${SUPPORT_TOKEN}" ]]; then
                echo "ERROR: Support token is empty"
                echo "Command output: ${SUPPORT_OUTPUT}"
                exit 1
              fi
              echo "Support token generated: ${SUPPORT_TOKEN:0:20}..."

              echo "Generating OAuth token..."
              OAUTH_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" --location "${ART_URL}/access/api/v1/oauth/token" \
                --header 'Content-Type: application/x-www-form-urlencoded' \
                --header "Authorization: Bearer ${SUPPORT_TOKEN}" \
                --data-urlencode "username=${JFROG_ADMIN_USERNAME}" \
                --data-urlencode 'scope=applied-permissions/admin' \
                --data-urlencode 'expires_in=36000' \
                --data-urlencode 'grant_type=client_credentials' \
                --data-urlencode 'audience=*@*')

              OAUTH_HTTP_CODE=$(echo "${OAUTH_RESPONSE}" | grep "HTTP_CODE:" | cut -d':' -f2)
              OAUTH_BODY=$(echo "${OAUTH_RESPONSE}" | grep -v "HTTP_CODE:")

              if [[ "${OAUTH_HTTP_CODE}" != "200" ]]; then
                echo "ERROR: OAuth token request failed with HTTP ${OAUTH_HTTP_CODE}"
                echo "Response: ${OAUTH_BODY}"
                exit 1
              fi

              OAUTH_TOKEN=$(echo "${OAUTH_BODY}" | jq -r .access_token)

              if [[ -z "${OAUTH_TOKEN}" || "${OAUTH_TOKEN}" == "null" ]]; then
                echo "ERROR: Failed to parse OAuth token from response"
                echo "Response: ${OAUTH_BODY}"
                echo "OAUTH_TOKEN=${OAUTH_TOKEN}"
                exit 1
              fi

              echo "OAuth Token generated successfully: ${OAUTH_TOKEN:0:20}..."
              echo "Access Token generated successfully: ${OAUTH_TOKEN}"
              
              # Write OAUTH_TOKEN and ART_URL to jfrog_oauth_token resource
              write_output jfrog_oauth_token "token=${OAUTH_TOKEN}"
              write_output jfrog_oauth_token "url=${ART_URL}"
              echo "OAUTH_TOKEN and URL written to jfrog_oauth_token"

      - name: jfrog_cli_tests
        type: Bash
        configuration:
          integrations:
            - name: docker_jfrog_io_reader
            - name: jfrog_cli_gh
          inputResources:
            - name: jfrog_cli
            - name: jfrog_oauth_token
          inputSteps:
            - name: setup_environment
              status:
                - success
                - skipped
        execution:
          onStart:
            - apt-get update
            - apt-get install -y jq curl ca-certificates git
          onExecute:
            - |
              set -eo pipefail
              FAILED_WORKFLOWS=""
              LAST_SUMMARY=""

              fail_jf_cli_tests() {
                local msg="$1"
                echo "ERROR: ${msg}"
                exit 1
              }

              OAUTH_TOKEN="${res_jfrog_oauth_token_token}"
              JFROG_URL="${res_jfrog_oauth_token_url}"
              CLI_REF="${JFROG_CLI_GITHUB_REF:-${res_jfrog_cli_commitSha}}"

              if [[ -z "${OAUTH_TOKEN}" || "${OAUTH_TOKEN}" == "null" ]]; then
                fail_jf_cli_tests "OAuth token not found on jfrog_oauth_token resource"
              fi
              if [[ -z "${JFROG_URL}" ]]; then
                fail_jf_cli_tests "Platform URL not found on jfrog_oauth_token resource"
              fi
              if [[ -z "${CLI_REF}" ]]; then
                fail_jf_cli_tests "No CLI ref available; set JFROG_CLI_GITHUB_REF or ensure jfrog_cli resource exposes commit SHA"
              fi

              GH_API_URL="${GITHUB_API_URL:-https://github.jfrog.info/api/v3}"
              GH_WORKFLOWS_REPO="${GITHUB_WORKFLOWS_REPO:-JFROG/jfrog-cli-workflows}"
              GH_WORKFLOWS_REF="${GITHUB_WORKFLOWS_REF:-feature/RTECO-1003-add-podman-pipelines-workflows}"
              GH_JF_CLI_REPO="${JFROG_CLI_GITHUB_REPO:-jfrog/jfrog-cli}"
              GH_ACTIONS_RUNNER="${GHE_ACTIONS_RUNNER:-artifactory-dind-amd-scale-set}"

              GITHUB_TOKEN_RESOLVED="${GITHUB_DISPATCH_TOKEN:-}"
              if [[ -z "${GITHUB_TOKEN_RESOLVED}" ]]; then GITHUB_TOKEN_RESOLVED="${int_jfrog_cli_gh_token:-}"; fi
              if [[ -z "${GITHUB_TOKEN_RESOLVED}" ]]; then GITHUB_TOKEN_RESOLVED="${int_jfrog_cli_gh_accessToken:-}"; fi
              if [[ -z "${GITHUB_TOKEN_RESOLVED}" ]]; then
                fail_jf_cli_tests "No GitHub token for API calls. Set GITHUB_DISPATCH_TOKEN (repo + workflow PAT), or configure jfrog_cli_gh integration with a PAT."
              fi
              echo "Using GitHub API token (length ${#GITHUB_TOKEN_RESOLVED}) against ${GH_API_URL}"

              # ── Build the list of workflows to dispatch ──────────────────────
              ALL_WORKFLOW_FILES="artifactoryTests.yml goTests.yml npmTests.yml pnpmTests.yml pythonTests.yml mavenTests.yml gradleTests.yml nugetTests.yml conanTests.yml helmTests.yml lifecycleTests.yml accessTests.yml pluginsTests.yml dockerTests.yml podmanTests.yml distributionTests.yml transferTests.yml"

              WORKFLOW_FILES=""
              for f in ${ALL_WORKFLOW_FILES}; do
                case "${f}" in
                  dockerTests.yml|transferTests.yml)
                    if [[ -z "${RTLIC:-}" ]]; then
                      echo "RTLIC is empty; skipping ${f}"
                      continue
                    fi ;;
                esac
                WORKFLOW_FILES="${WORKFLOW_FILES} ${f}"
              done

              echo "Workflows to dispatch:${WORKFLOW_FILES}"
              echo "  workflows repo : ${GH_WORKFLOWS_REPO} (ref ${GH_WORKFLOWS_REF})"
              echo "  jfrog_cli_repo : ${GH_JF_CLI_REPO}"
              echo "  jfrog_cli_ref  : ${CLI_REF}"
              echo "  jfrog_url      : ${JFROG_URL}"

              # ── Verify repo access ───────────────────────────────────────────
              REPO_CODE=$(curl -sS -o /tmp/gh_repo.json -w "%{http_code}" \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN_RESOLVED}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${GH_API_URL}/repos/${GH_WORKFLOWS_REPO}")
              if [[ "${REPO_CODE}" != "200" ]]; then
                echo "GET /repos/${GH_WORKFLOWS_REPO} returned HTTP ${REPO_CODE}"
                cat /tmp/gh_repo.json 2>/dev/null || true
                fail_jf_cli_tests "Unable to access workflows repository ${GH_WORKFLOWS_REPO} (HTTP ${REPO_CODE})"
              fi

              # ── Fetch all indexed workflow definitions ───────────────────────
              curl -sS -o /tmp/gh_workflows.json \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN_RESOLVED}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${GH_API_URL}/repos/${GH_WORKFLOWS_REPO}/actions/workflows"

              # ── Build common inputs JSON ─────────────────────────────────────
              COMMON_INPUTS=$(jq -n \
                --arg jfrog_cli_repository "${GH_JF_CLI_REPO}" \
                --arg jfrog_cli_ref "${CLI_REF}" \
                --arg jfrog_url "${JFROG_URL}" \
                --arg jfrog_admin_token "${OAUTH_TOKEN}" \
                --arg runner "${GH_ACTIONS_RUNNER}" \
                '{jfrog_cli_repository: $jfrog_cli_repository,
                  jfrog_cli_ref: $jfrog_cli_ref,
                  jfrog_url: $jfrog_url,
                  jfrog_admin_token: $jfrog_admin_token,
                  runner: $runner}')

              # ── Dispatch each workflow ───────────────────────────────────────
              DISPATCHED=""
              for GH_WF_FILE in ${WORKFLOW_FILES}; do
                WORKFLOW_ID=$(jq -r --arg f "${GH_WF_FILE}" \
                  '.workflows[] | select(.path | endswith($f)) | .id' /tmp/gh_workflows.json | head -1)
                if [[ -z "${WORKFLOW_ID}" || "${WORKFLOW_ID}" == "null" ]]; then
                  echo "WARNING: No indexed workflow ending in ${GH_WF_FILE} — skipping"
                  continue
                fi

                case "${GH_WF_FILE}" in
                  dockerTests.yml|transferTests.yml)
                    INPUTS=$(echo "${COMMON_INPUTS}" | jq --arg rtlic "${RTLIC}" '. + {rtlic: $rtlic}') ;;
                  distributionTests.yml)
                    INPUTS=$(echo "${COMMON_INPUTS}" | jq --arg jfrog_user "${JFROG_ADMIN_USERNAME:-admin}" '. + {jfrog_user: $jfrog_user}') ;;
                  *)
                    INPUTS="${COMMON_INPUTS}" ;;
                esac

                DISPATCH_BODY=$(jq -n --arg ref "${GH_WORKFLOWS_REF}" --argjson inputs "${INPUTS}" \
                  '{ref: $ref, inputs: $inputs}')

                HTTP_CODE=$(curl -sS -o /tmp/gh_dispatch_resp.txt -w "%{http_code}" -X POST \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${GITHUB_TOKEN_RESOLVED}" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  -d "${DISPATCH_BODY}" \
                  "${GH_API_URL}/repos/${GH_WORKFLOWS_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches")

                if [[ "${HTTP_CODE}" != "204" ]]; then
                  echo "dispatch ${GH_WF_FILE} failed (HTTP ${HTTP_CODE})"
                  cat /tmp/gh_dispatch_resp.txt 2>/dev/null || true
                  fail_jf_cli_tests "Workflow dispatch failed for ${GH_WF_FILE} (HTTP ${HTTP_CODE})"
                fi
                echo "Dispatched ${GH_WF_FILE} (id=${WORKFLOW_ID})"
                DISPATCHED="${DISPATCHED} ${GH_WF_FILE}:${WORKFLOW_ID}"
              done

              if [[ -z "${DISPATCHED}" ]]; then
                fail_jf_cli_tests "No workflows were dispatched"
              fi

              # ── Resolve run IDs ──────────────────────────────────────────────
              echo ""
              echo "Waiting 30s for runs to appear..."
              sleep 30

              RUN_ENTRIES=""
              for ENTRY in ${DISPATCHED}; do
                GH_WF_FILE="${ENTRY%%:*}"
                WF_ID="${ENTRY##*:}"
                RUN_ID=""
                for attempt in $(seq 1 20); do
                  RUN_ID=$(curl -sS \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer ${GITHUB_TOKEN_RESOLVED}" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "${GH_API_URL}/repos/${GH_WORKFLOWS_REPO}/actions/workflows/${WF_ID}/runs?per_page=1&event=workflow_dispatch" \
                    | jq -r '.workflow_runs[0].id // empty')
                  if [[ -n "${RUN_ID}" && "${RUN_ID}" != "null" ]]; then break; fi
                  echo "  ${GH_WF_FILE}: run not listed yet (attempt ${attempt}/20), sleeping 10s..."
                  sleep 10
                done
                if [[ -z "${RUN_ID}" || "${RUN_ID}" == "null" ]]; then
                  fail_jf_cli_tests "Could not resolve run id for ${GH_WF_FILE}"
                fi
                echo "  ${GH_WF_FILE}: run id=${RUN_ID}"
                RUN_ENTRIES="${RUN_ENTRIES} ${GH_WF_FILE}:${RUN_ID}"
              done

              # ── Poll all runs until every one completes ──────────────────────
              echo ""
              echo "Monitoring all workflow runs..."
              MAX_WAIT=7200
              ELAPSED=0
              INTERVAL=60

              while [[ ${ELAPSED} -lt ${MAX_WAIT} ]]; do
                ALL_DONE=true
                ANY_FAILED=false
                FAILED_WORKFLOWS=""
                LAST_SUMMARY=""

                for ENTRY in ${RUN_ENTRIES}; do
                  GH_WF_FILE="${ENTRY%%:*}"
                  RUN_ID="${ENTRY##*:}"
                  RUN_JSON=$(curl -sS \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer ${GITHUB_TOKEN_RESOLVED}" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "${GH_API_URL}/repos/${GH_WORKFLOWS_REPO}/actions/runs/${RUN_ID}")
                  STATUS=$(echo "${RUN_JSON}" | jq -r '.status // empty')
                  CONCLUSION=$(echo "${RUN_JSON}" | jq -r '.conclusion // empty')

                  if [[ "${STATUS}" != "completed" ]]; then
                    ALL_DONE=false
                    echo "  [running] ${GH_WF_FILE} (${RUN_ID}): ${STATUS}"
                    LAST_SUMMARY="${LAST_SUMMARY}${GH_WF_FILE}:${STATUS};"
                  elif [[ "${CONCLUSION}" != "success" ]]; then
                    ANY_FAILED=true
                    echo "  [FAILED]  ${GH_WF_FILE} (${RUN_ID}): ${CONCLUSION}"
                    FAILED_WORKFLOWS="${FAILED_WORKFLOWS} ${GH_WF_FILE}"
                    LAST_SUMMARY="${LAST_SUMMARY}${GH_WF_FILE}:${CONCLUSION};"
                  else
                    echo "  [ok]      ${GH_WF_FILE} (${RUN_ID}): success"
                    LAST_SUMMARY="${LAST_SUMMARY}${GH_WF_FILE}:success;"
                  fi
                done

                if [[ "${ALL_DONE}" == "true" ]]; then
                  echo ""
                  if [[ "${ANY_FAILED}" == "true" ]]; then
                    fail_jf_cli_tests "One or more workflow runs failed. ${LAST_SUMMARY}"
                  fi
                  echo "All workflow runs completed successfully."
                  exit 0
                fi

                echo "  --- sleeping ${INTERVAL}s (elapsed ${ELAPSED}s / ${MAX_WAIT}s) ---"
                sleep "${INTERVAL}"
                ELAPSED=$((ELAPSED + INTERVAL))
              done

              fail_jf_cli_tests "Timed out after ${MAX_WAIT}s while waiting for workflow runs. ${LAST_SUMMARY}"

          onSuccess:
            - echo "JFrog CLI integration tests finished successfully."

          onFailure:
            - echo "JFrog CLI integration tests failed"

          onComplete:
            - echo "jfrog_cli_tests step completed"

      - name: teardown_env
        type: Jenkins
        configuration:
          condition: 'SKIP_ENV_SETUP != "true"'
          inputSteps:
            - name: jfrog_cli_tests
              status:
                - success
                - failure
                - error
                - cancelled
                - skipped
                - unstable
                - timeout
          integrations:
            - name: jenkins_entplus_rt
          jenkinsJobName: tools/platform/environment_operate
          buildParameters:
            SERVER_NAME: "${server_name}"
            ACTION: "delete"
