name: HuggingFace Tests
on:
  workflow_call:
  workflow_dispatch:
    inputs:
      jfrog_url:
        description: "External JFrog Platform URL. Leave empty for local Artifactory."
        type: string
        required: false
        default: ""
      jfrog_admin_token:
        description: "Admin token for external JFrog Platform."
        type: string
        required: false
        default: ""

permissions:
  id-token: write
  contents: read
jobs:
  HuggingFace-Tests:
    name: HuggingFace tests (${{ matrix.os.name }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu
            version: 24.04
          - name: windows
            version: 2022
          - name: macos
            version: 14
    runs-on: ${{ matrix.os.name }}-${{ matrix.os.version }}
    steps:
      - name: Skip macOS - JGC-413
        if: matrix.os.name == 'macos'
        run: |
          echo "::warning::JGC-413 - Skip until artifactory bootstrap in osx is fixed"
          exit 0

      - name: Checkout code
        if: matrix.os.name != 'macos'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup FastCI
        if: matrix.os.name != 'macos'
        uses: jfrog-fastci/fastci@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fastci_otel_token: ${{ secrets.FASTCI_TOKEN }}

      - name: Setup Go with cache
        if: matrix.os.name != 'macos'
        uses: jfrog/.github/actions/install-go-with-cache@main

      - name: Setup Python
        if: matrix.os.name != 'macos'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install HuggingFace Library
        if: matrix.os.name != 'macos'
        run: |
          # Pin to 1.19.0: huggingface_hub 1.20.0 made RepoUrl parse the commit
          # response's commitUrl field strictly as an hf:// URI (PR #4324), which
          # breaks against Artifactory's placeholder commitUrl value.
          pip install "huggingface_hub==1.19.0"
        shell: bash

      - name: Debug macOS Environment and Set Timeout
        if: runner.os == 'macOS'
        run: |
          echo "=== macOS Debug Information ==="
          echo "Architecture: $(uname -m)"
          echo "macOS Version: $(sw_vers -productVersion)"
          echo "macOS Build: $(sw_vers -buildVersion)"
          echo "Available memory: $(system_profiler SPHardwareDataType | grep Memory || echo 'Memory info not available')"
          echo "Available disk space: $(df -h)"
          echo "Go version: $(go version)"
          echo "Setting RT_CONNECTION_TIMEOUT_SECONDS to 2400 for macOS"
          echo "RT_CONNECTION_TIMEOUT_SECONDS=2400" >> $GITHUB_ENV

      - name: Install local Artifactory
        if: matrix.os.name != 'macos'
        uses: jfrog/.github/actions/install-local-artifactory@main
        with:
          RTLIC: ${{ secrets.RTLIC }}
          JFROG_URL: ${{ inputs.jfrog_url }}
          JFROG_ADMIN_TOKEN: ${{ inputs.jfrog_admin_token }}
          RT_CONNECTION_TIMEOUT_SECONDS: ${{ env.RT_CONNECTION_TIMEOUT_SECONDS || '1200' }}

      - name: Get ID Token and Exchange Token
        if: matrix.os.name != 'macos'
        shell: bash
        run: |
          ID_TOKEN=$(curl -sLS -H "User-Agent: actions/oidc-client" -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" | jq .value | tr -d '"')
          echo "JFROG_CLI_OIDC_EXCHANGE_TOKEN_ID=${ID_TOKEN}" >> $GITHUB_ENV

      - name: Run HuggingFace tests
        if: matrix.os.name != 'macos'
        run: >-
          go test -v github.com/jfrog/jfrog-cli --timeout 0 --test.huggingface
          --jfrog.url=${{ env.JFROG_TESTS_URL || 'http://127.0.0.1:8082' }}
          --jfrog.adminToken=${{ env.JFROG_TESTS_LOCAL_ACCESS_TOKEN }}
