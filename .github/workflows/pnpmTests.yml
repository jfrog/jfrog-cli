name: pnpm Tests
on:
  workflow_dispatch:
    inputs:
      jfrog_url:
        description: "External JFrog Platform URL. Leave empty for local Artifactory."
        type: string
        required: false
        default: ""
      jfrog_admin_token:
        description: "Admin token for external JFrog Platform."
        type: string
        required: false
        default: ""
  push:
    branches:
      - "master"
  pull_request_target:
    types: [labeled]
    branches:
      - "master"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pnpm-Tests:
    name: "pnpm 10 tests (${{ matrix.os.name }})"
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'safe to test')
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu
            version: 24.04
          - name: windows
            version: 2022
          - name: macos
            version: 14
    runs-on: ${{ matrix.os.name }}-${{ matrix.os.version }}
    steps:
      - name: Skip macOS - JGC-413
        if: matrix.os.name == 'macos'
        run: |
          echo "::warning::JGC-413 - Skip until artifactory bootstrap in osx is fixed"
          exit 0

      - name: Checkout code
        if: matrix.os.name != 'macos'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup FastCI
        if: matrix.os.name != 'macos'
        uses: jfrog-fastci/fastci@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fastci_otel_token: ${{ secrets.FASTCI_TOKEN }}

      - name: Install Node.js
        if: matrix.os.name != 'macos'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm 10
        if: matrix.os.name != 'macos'
        run: npm install -g pnpm@10

      - name: Validate pnpm version is 10
        if: matrix.os.name != 'macos'
        shell: bash
        run: |
          PNPM_VER=$(pnpm --version)
          PNPM_MAJOR=$(echo "$PNPM_VER" | cut -d. -f1)
          echo "pnpm version: ${PNPM_VER}"
          if [ "$PNPM_MAJOR" -ne 10 ]; then
            echo "::error::Expected pnpm 10.x but got ${PNPM_VER}"
            exit 1
          fi
          echo "pnpm ${PNPM_VER} OK"

      - name: Setup Go with cache
        if: matrix.os.name != 'macos'
        uses: jfrog/.github/actions/install-go-with-cache@main

      - name: Install local Artifactory
        if: matrix.os.name != 'macos'
        uses: jfrog/.github/actions/install-local-artifactory@main
        with:
          RTLIC: ${{ secrets.RTLIC }}
          JFROG_URL: ${{ inputs.jfrog_url }}
          JFROG_ADMIN_TOKEN: ${{ inputs.jfrog_admin_token }}
          RT_CONNECTION_TIMEOUT_SECONDS: ${{ env.RT_CONNECTION_TIMEOUT_SECONDS || '1200' }}

      - name: Run pnpm tests
        if: matrix.os.name != 'macos'
        env:
          YARN_IGNORE_NODE: 1
        run: >-
          go test -v github.com/jfrog/jfrog-cli --timeout 0 --test.pnpm
          ${{ env.JFROG_TESTS_IS_EXTERNAL == 'true' && format('--jfrog.url={0} --jfrog.adminToken={1}', env.JFROG_TESTS_URL, env.JFROG_TESTS_LOCAL_ACCESS_TOKEN) || '' }}
